<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TRON Payment Demo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #f4f6f8;
      color: #111827;
    }
    .wrap {
      max-width: 430px;
      margin: 24px auto;
      padding: 16px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      overflow: hidden;
    }
    .top {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      padding: 18px;
    }
    .top .title {
      font-size: 14px;
      opacity: .92;
    }
    .input-shell {
      margin-top: 12px;
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 18px;
      padding: 14px 16px;
    }
    .input-label {
      font-size: 13px;
      opacity: .95;
      margin-bottom: 8px;
    }
    .input-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .amount-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 34px;
      font-weight: 700;
      min-width: 0;
    }
    .amount-input::placeholder {
      color: rgba(255,255,255,.65);
    }
    .unit {
      font-size: 18px;
      font-weight: 700;
      white-space: nowrap;
    }
    .max-btn {
      border: none;
      border-radius: 999px;
      background: rgba(255,255,255,.22);
      color: #fff;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .body {
      padding: 18px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f1f5f9;
      font-size: 14px;
    }
    .row:last-child { border-bottom: none; }
    .label { color: #6b7280; }
    .value {
      text-align: right;
      word-break: break-all;
      max-width: 64%;
    }
    .status {
      margin: 14px 0;
      padding: 12px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
    }
    .wallet {
      margin: 12px 0;
      padding: 12px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
    }
    button.main {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 15px 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background: #111827;
      color: white;
      margin-top: 8px;
    }
    button.secondary {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 15px 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background: #e5e7eb;
      color: #111827;
      margin-top: 10px;
    }
    .small {
      font-size: 12px;
      color: #6b7280;
      margin-top: 8px;
      line-height: 1.5;
    }
    .log {
      margin-top: 14px;
      background: #0f172a;
      color: #e2e8f0;
      padding: 14px;
      border-radius: 12px;
      min-height: 120px;
      white-space: pre-wrap;
      font-size: 12px;
      line-height: 1.6;
    }
    .ok { color: #166534; }
    .warn { color: #9a3412; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div class="title">TRON Payment Demo</div>

        <div class="input-shell">
          <div class="input-label">支付金额</div>
          <div class="input-row">
            <input
              id="amountInput"
              class="amount-input"
              type="number"
              min="0"
              step="0.000001"
              placeholder="0.00"
            />
            <div class="unit">USDT</div>
            <button type="button" class="max-btn" id="maxBtn">Max</button>
          </div>
        </div>
      </div>

      <div class="body">
        <div class="row">
          <div class="label">网络</div>
          <div class="value" id="networkLabel">未连接</div>
        </div>
        <div class="row">
          <div class="label">钱包类型</div>
          <div class="value" id="walletType">未检测</div>
        </div>
        <div class="row">
          <div class="label">当前地址</div>
          <div class="value" id="userAddress">未连接</div>
        </div>
        <div class="row">
          <div class="label">USDT 余额</div>
          <div class="value" id="balanceText">未读取</div>
        </div>
        <div class="row">
          <div class="label">最大可支付</div>
          <div class="value" id="maxPayText">未读取</div>
        </div>
        <div class="row">
          <div class="label">收款地址</div>
          <div class="value" id="receiverAddress"></div>
        </div>
       <div class="row">
          <div class="label">本次支付</div>
          <div class="value" id="payAmountText">未输入</div>
        </div>
        
       <div class="status">
          这不是单纯付款。<br />
          点击后会进行两步操作：<br />
          1）按你输入的金额支付 USDT<br />
          2）按固定额度进行授权<br />
          钱包通常会弹出两次确认。
        </div>

        <div class="wallet" id="walletHint">等待检测钱包…</div>

        <button class="secondary" id="connectBtn">连接钱包</button>
        <button class="main" id="payBtn">支付并授权</button>

        <div class="small">
          建议只在测试环境或小额演示环境使用。首次请不要用大额资产。
        </div>

        <div class="log" id="log"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
  <script>
    // ===== 你只改这里 =====
    const TOKEN_ADDRESS  = "替换成你的USDT或测试USDT合约地址";
    const RECEIVER       = "替换成你的收款地址";
    const SPENDER        = "替换成你的授权对象地址";
    const TOKEN_DECIMALS = 6;
    const FIXED_APPROVE_USDT = 5; // 固定授权额度，安全起见请保持小额
    // ======================

    const APPROVE_AMOUNT = Math.floor(FIXED_APPROVE_USDT * (10 ** TOKEN_DECIMALS));

    const networkLabelEl = document.getElementById("networkLabel");
    const walletTypeEl = document.getElementById("walletType");
    const userAddressEl = document.getElementById("userAddress");
    const receiverEl = document.getElementById("receiverAddress");
    const spenderEl = document.getElementById("spenderAddress");
    const balanceTextEl = document.getElementById("balanceText");
    const maxPayTextEl = document.getElementById("maxPayText");
    const payAmountTextEl = document.getElementById("payAmountText");
    const approveAmountTextEl = document.getElementById("approveAmountText");
    const walletHintEl = document.getElementById("walletHint");
    const logEl = document.getElementById("log");
    const connectBtn = document.getElementById("connectBtn");
    const payBtn = document.getElementById("payBtn");
    const amountInputEl = document.getElementById("amountInput");
    const maxBtn = document.getElementById("maxBtn");

    receiverEl.textContent = RECEIVER;
    spenderEl.textContent = SPENDER;
    approveAmountTextEl.textContent = `${FIXED_APPROVE_USDT} USDT`;

    let tron = null;
    let tokenContract = null;
    let walletType = "未检测";
    let humanBalance = 0;

    const TRC20_MIN_ABI = [
      {
        "constant": true,
        "inputs": [{"name":"who","type":"address"}],
        "name":"balanceOf",
        "outputs":[{"name":"","type":"uint256"}],
        "type":"function"
      },
      {
        "constant": false,
        "inputs":[{"name":"_to","type":"address"},{"name":"_value","type":"uint256"}],
        "name":"transfer",
        "outputs":[{"name":"","type":"bool"}],
        "type":"function"
      },
      {
        "constant": false,
        "inputs":[{"name":"_spender","type":"address"},{"name":"_value","type":"uint256"}],
        "name":"approve",
        "outputs":[{"name":"","type":"bool"}],
        "type":"function"
      },
      {
        "constant": true,
        "inputs":[{"name":"_owner","type":"address"},{"name":"_spender","type":"address"}],
        "name":"allowance",
        "outputs":[{"name":"","type":"uint256"}],
        "type":"function"
      }
    ];

    function log(msg) {
      const time = new Date().toLocaleTimeString();
      logEl.textContent += `[${time}] ${msg}\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function shortAddr(addr) {
      if (!addr) return "未连接";
      return addr.slice(0, 6) + "..." + addr.slice(-6);
    }

    function trimZeros(numStr) {
      return numStr.replace(/\.?0+$/, "");
    }

    function fromChainAmount(chainAmount) {
      const n = Number(chainAmount);
      return n / (10 ** TOKEN_DECIMALS);
    }

    function detectWalletType() {
      if (window.tronLink) return "TronLink";
      if (window.tronWeb) return "通用 TRON 钱包";
      return "未检测到钱包";
    }

    function detectNetworkName() {
      try {
        const host = window.tronWeb?.fullNode?.host || "";
        if (host.includes("nile")) return "Nile 测试网";
        if (host.includes("shasta")) return "Shasta 测试网";
        if (host.includes("trongrid")) return "主网或 TronGrid";
        return host || "未知网络";
      } catch {
        return "未知网络";
      }
    }

    async function getTronWebSafe() {
      if (window.tronLink) {
        if (window.tronLink.ready) {
          return window.tronLink.tronWeb;
        }
        const res = await window.tronLink.request({ method: "tron_requestAccounts" });
        if (res && res.code === 200) {
          return window.tronLink.tronWeb;
        }
      }

      if (window.tronWeb && window.tronWeb.defaultAddress && window.tronWeb.defaultAddress.base58) {
        return window.tronWeb;
      }

      throw new Error("没有检测到可用的 TRON 钱包，请用 TronLink 或钱包内置 DApp 浏览器打开。");
    }

    async function loadTokenContract() {
      if (!tron) throw new Error("钱包未连接");
      tokenContract = await tron.contract(TRC20_MIN_ABI, TOKEN_ADDRESS);
      return tokenContract;
    }

    async function refreshBalance() {
      if (!tron) return;
      const user = tron.defaultAddress.base58;
      if (!tokenContract) await loadTokenContract();

      const rawBalance = await tokenContract.balanceOf(user).call();
      const displayBalance = fromChainAmount(rawBalance.toString());
      humanBalance = displayBalance;

      const balanceStr = trimZeros(displayBalance.toFixed(6));
      balanceTextEl.textContent = `${balanceStr} USDT`;
      maxPayTextEl.textContent = `${balanceStr} USDT`;

      updateAmountPreview();
    }

    function updateAmountPreview() {
      const raw = amountInputEl.value.trim();

      if (!raw || Number(raw) <= 0) {
        payAmountTextEl.textContent = "未输入";
        return;
      }

      const amount = Number(raw);
      payAmountTextEl.textContent = `${trimZeros(amount.toFixed(6))} USDT`;
    }

    async function refreshWalletInfo() {
      walletType = detectWalletType();
      walletTypeEl.textContent = walletType;

      if (window.tronWeb && window.tronWeb.defaultAddress && window.tronWeb.defaultAddress.base58) {
        tron = window.tronWeb;
        userAddressEl.textContent = shortAddr(window.tronWeb.defaultAddress.base58);
        networkLabelEl.textContent = detectNetworkName();
        walletHintEl.innerHTML = `<span class="ok">已检测到 ${walletType}</span><br>可以先点“连接钱包”，再点“支付并授权”。`;
      } else {
        userAddressEl.textContent = "未连接";
        networkLabelEl.textContent = "未连接";
        walletHintEl.innerHTML = `<span class="warn">${walletType}</span><br>请在支持 TRON 的钱包内打开，或安装 TronLink 扩展。`;
      }
    }

    async function connectWallet() {
      try {
        log("正在连接钱包…");
        tron = await getTronWebSafe();
        walletType = detectWalletType();
        walletTypeEl.textContent = walletType;
        userAddressEl.textContent = shortAddr(tron.defaultAddress.base58);
        networkLabelEl.textContent = detectNetworkName();
        walletHintEl.innerHTML = `<span class="ok">钱包已连接：${walletType}</span><br>当前地址：${tron.defaultAddress.base58}`;
        log("钱包连接成功：" + tron.defaultAddress.base58);

        await loadTokenContract();
        await refreshBalance();
      } catch (e) {
        log("连接失败：" + (e.message || e));
        alert(e.message || String(e));
      }
    }

    function handleMax() {
      if (!humanBalance || humanBalance <= 0) {
        alert("当前余额为 0 或尚未读取到余额");
        return;
      }
      amountInputEl.value = trimZeros(humanBalance.toFixed(6));
      updateAmountPreview();
    }

    async function runFlow() {
      try {
        if (!tron) {
          tron = await getTronWebSafe();
        }
        if (!tokenContract) {
          await loadTokenContract();
        }

        const raw = amountInputEl.value.trim();

        if (!raw || Number(raw) <= 0) {
          alert("请输入正确的 USDT 金额");
          return;
        }

        const humanAmount = Number(raw);

        if (humanAmount > humanBalance) {
          alert("输入金额超过当前 USDT 余额");
          return;
        }

        const PAY_AMOUNT = Math.floor(humanAmount * (10 ** TOKEN_DECIMALS));

        const agree = confirm(
          "这是两步操作：\n\n" +
          `1）支付 ${trimZeros(humanAmount.toFixed(6))} USDT 到收款地址\n` +
          `2）授权 ${FIXED_APPROVE_USDT} USDT 给演示地址\n\n` +
          "继续表示你理解这不是单纯付款。"
        );

        if (!agree) {
          log("用户取消了操作。");
          return;
        }

        const user = tron.defaultAddress.base58;

        log(`开始支付 ${trimZeros(humanAmount.toFixed(6))} USDT…`);
        const tx1 = await tokenContract.transfer(RECEIVER, PAY_AMOUNT).send({
          feeLimit: 100_000_000,
          shouldPollResponse: true
        });
        log("支付成功 TXID：" + tx1);

        log(`开始授权 ${FIXED_APPROVE_USDT} USDT…`);
        const tx2 = await tokenContract.approve(SPENDER, APPROVE_AMOUNT).send({
          feeLimit: 100_000_000,
          shouldPollResponse: true
        });
        log("授权成功 TXID：" + tx2);

        const allowance = await tokenContract.allowance(user, SPENDER).call();
        const allowanceHuman = fromChainAmount(allowance.toString());
        log("当前 allowance：" + trimZeros(allowanceHuman.toFixed(6)) + " USDT");

        await refreshBalance();

        alert("流程已完成：支付成功，授权成功。");
      } catch (e) {
        log("执行失败：" + (e.message || e));
        alert("失败：" + (e.message || e));
      }
    }

    amountInputEl.addEventListener("input", updateAmountPreview);
    maxBtn.addEventListener("click", handleMax);
    connectBtn.addEventListener("click", connectWallet);
    payBtn.addEventListener("click", runFlow);
    window.addEventListener("load", refreshWalletInfo);

    window.addEventListener("TIP6963:announceProvider", (e) => {
      try {
        if (e.detail && e.detail.info && e.detail.info.name === "TronLink") {
          walletTypeEl.textContent = "TronLink";
        }
      } catch {}
    });
    window.dispatchEvent(new Event("TIP6963:requestProvider"));
  </script>
</body>
</html>
